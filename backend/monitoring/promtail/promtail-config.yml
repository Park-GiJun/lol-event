server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["lol-.*"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_name']
        regex: '/lol-(.*)'
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    pipeline_stages:
      - json:
          expressions:
            level: level
            app: app
            logger: logger
            message: message
            trace_id: traceId
      - labels:
          level:
          app:
      - match:
          selector: '{service=~".+"} |~ ".*"'
          stages:
            - regex:
                expression: '^\[.*\]\s+\d+\s+-\s+.*(?P<level>LOG|ERROR|WARN|DEBUG|VERBOSE)'
            - labels:
                level:
