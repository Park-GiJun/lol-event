<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>LoL 수집기</title>
  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --surface2: #1e2130;
      --border: #2a2d3e;
      --primary: #c89b3c;
      --primary-dim: rgba(200,155,60,0.15);
      --text: #d8d0c0;
      --text-secondary: #7a7f96;
      --win: #0bc4b4;
      --lose: #e84057;
      --warn: #f0a500;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    /* 드래그 가능 타이틀바 */
    .titlebar {
      -webkit-app-region: drag;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .titlebar h1 { font-size: 13px; font-weight: 600; color: var(--primary); }
    .titlebar .version { font-size: 10px; color: var(--text-secondary); margin-left: 4px; }

    .content { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 12px; }

    /* 상태 카드 */
    .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .status-card .label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; }
    .status-card .val { font-size: 12px; font-weight: 600; }
    .val.ok { color: var(--win); }
    .val.error { color: var(--lose); }
    .val.neutral { color: var(--text-secondary); }
    .dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 50%;
      background: #444; margin-right: 5px; vertical-align: middle;
      flex-shrink: 0;
    }
    .dot.ok { background: var(--win); box-shadow: 0 0 5px var(--win); }
    .dot.error { background: var(--lose); }

    /* 소환사 정보 */
    .summoner-bar {
      background: var(--primary-dim);
      border: 1px solid rgba(200,155,60,0.3);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--primary);
      font-weight: 500;
      display: none;
    }
    .summoner-bar.visible { display: block; }

    /* 업데이트 배너 */
    .update-bar {
      background: rgba(11,196,180,0.1);
      border: 1px solid var(--win);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--win);
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .update-bar.visible { display: flex; }
    .update-bar button {
      background: var(--win);
      color: #0d0f14;
      border: none;
      border-radius: 4px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* 버튼 */
    .btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 10px 16px;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.98); }
    .btn:not(:disabled):hover { opacity: 0.85; }
    .btn-primary { background: var(--primary); color: #0d0f14; }

    /* 진행 바 */
    .progress-wrap {
      height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-bar { height: 100%; background: var(--primary); width: 0; transition: width 0.3s; }
    .progress-bar.running {
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); width: 60%; }
      100% { transform: translateX(200%); width: 60%; }
    }

    /* 로그 */
    .log-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
    .log-title { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.4px; }
    .log {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow-y: auto;
      padding: 8px 10px;
      font-family: 'Cascadia Code', 'Consolas', 'D2Coding', monospace;
      font-size: 11px;
      line-height: 1.9;
      min-height: 140px;
      max-height: 180px;
    }
    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-track { background: transparent; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .log-info { color: var(--text-secondary); }
    .log-progress { color: #5a7fa8; }
    .log-warn { color: var(--warn); }
    .log-error { color: var(--lose); }
    .log-done { color: var(--win); font-weight: 600; }
  </style>
</head>
<body>
  <div class="titlebar">
    <h1>LoL 수집기</h1>
    <span class="version" id="appVersion"></span>
  </div>

  <div class="content">
    <!-- 상태 -->
    <div class="status-grid">
      <div class="status-card">
        <div class="label">LoL 클라이언트</div>
        <div class="val" id="lcuStatus"><span class="dot" id="lcuDot"></span>확인 중...</div>
      </div>
      <div class="status-card">
        <div class="label">서버</div>
        <div class="val ok"><span class="dot ok"></span>api.gijun.net</div>
      </div>
    </div>

    <!-- 소환사 -->
    <div class="summoner-bar" id="summonerBar"></div>

    <!-- 업데이트 -->
    <div class="update-bar" id="updateBar">
      <span id="updateMsg"></span>
      <button onclick="window.lol.installUpdate()">지금 설치</button>
    </div>

    <!-- 진행 바 -->
    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

    <!-- 수집 버튼 -->
    <button class="btn btn-primary" id="collectBtn" onclick="startCollect()" disabled>
      수집 시작
    </button>

    <!-- 로그 -->
    <div class="log-wrap">
      <div class="log-title">수집 로그</div>
      <div class="log" id="log"><span class="log-info">대기 중...</span></div>
    </div>
  </div>

  <script>
    const logEl = document.getElementById('log');
    const collectBtn = document.getElementById('collectBtn');
    const lcuStatusEl = document.getElementById('lcuStatus');
    const lcuDot = document.getElementById('lcuDot');
    const summonerBar = document.getElementById('summonerBar');
    const progressBar = document.getElementById('progressBar');
    const updateBar = document.getElementById('updateBar');
    const updateMsg = document.getElementById('updateMsg');

    // 버전 표시
    window.lol.getVersion().then(v => {
      document.getElementById('appVersion').textContent = `v${v}`;
    });

    function addLog(type, message) {
      const first = logEl.querySelector('.log-info');
      if (first && first.textContent === '대기 중...') first.remove();
      const div = document.createElement('div');
      div.className = `log-${type}`;
      div.textContent = message;
      logEl.appendChild(div);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setCollecting(v) {
      collectBtn.disabled = v;
      collectBtn.textContent = v ? '수집 중...' : '수집 시작';
      progressBar.className = v ? 'progress-bar running' : 'progress-bar';
      if (!v) progressBar.style.width = '0';
    }

    function startCollect() {
      logEl.innerHTML = '';
      setCollecting(true);
      window.lol.startCollect();
    }

    // LCU 상태 업데이트
    window.lol.onStatus(status => {
      if (status.connected) {
        lcuDot.className = 'dot ok';
        lcuStatusEl.className = 'val ok';
        lcuStatusEl.innerHTML = `<span class="dot ok"></span>연결됨`;
        summonerBar.textContent = `${status.gameName}#${status.tagLine}`;
        summonerBar.classList.add('visible');
        collectBtn.disabled = false;
      } else {
        lcuDot.className = 'dot error';
        lcuStatusEl.className = 'val error';
        lcuStatusEl.innerHTML = `<span class="dot error"></span>${status.reason || '미연결'}`;
        summonerBar.classList.remove('visible');
        collectBtn.disabled = true;
      }
    });

    // 수집 로그
    window.lol.onLog((type, message) => {
      addLog(type, message);
      if (type === 'done' || type === 'error') setCollecting(false);
    });

    // 자동 업데이트
    window.lol.onUpdateAvailable(info => {
      updateMsg.textContent = `새 버전 v${info.version} 다운로드 중...`;
      updateBar.classList.add('visible');
    });
    window.lol.onUpdateDownloaded(info => {
      updateMsg.textContent = `v${info.version} 준비 완료`;
      updateBar.classList.add('visible');
    });

    // 초기 상태 요청
    window.lol.requestStatus();
    setInterval(() => window.lol.requestStatus(), 5000);
  </script>
</body>
</html>
